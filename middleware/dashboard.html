<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheelson Explorer · Live Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #070b12;
      --bg2: #0d1421;
      --bg3: #111827;
      --border: rgba(255, 255, 255, .06);
      --glow: #00ffd5;
      --glow-dim: rgba(0, 255, 213, .12);
      --glow-mid: rgba(0, 255, 213, .4);
      --text: #c8d8e8;
      --text-dim: #5a7080;
      --text-bright: #e8f4ff;
      --red: #ef4444;
      --green: #22c55e;
      --yellow: #f59e0b;
      --orange: #f97316;
      --cyan: #06b6d4;
      --violet: #8b5cf6;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Exo 2', sans-serif;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      overflow: hidden;
    }

    /* ── Scanline overlay ─────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, .12) 2px,
          rgba(0, 0, 0, .12) 4px);
      pointer-events: none;
      z-index: 1000;
    }

    /* ── Layout ───────────────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      gap: 0;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--mono);
      font-size: 18px;
      color: var(--glow);
      text-shadow: 0 0 16px var(--glow);
      white-space: nowrap;
    }

    .logo span {
      opacity: .5;
    }

    .header-meta {
      display: flex;
      gap: 20px;
      margin-left: auto;
      align-items: center;
    }

    .badge {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    #cycle-badge {
      color: var(--glow);
      border-color: var(--glow-mid);
      text-shadow: 0 0 8px var(--glow);
    }

    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all .3s;
    }

    .conn-dot.live {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    /* ── Camera Panel ─────────────────────────────────────────────── */
    .camera-panel {
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    #camera-feed {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      filter: brightness(.95) contrast(1.05) saturate(1.1);
    }

    .camera-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(var(--glow), var(--glow)) top 16px left 16px / 24px 2px no-repeat,
        linear-gradient(var(--glow), var(--glow)) top 16px left 16px / 2px 24px no-repeat,
        linear-gradient(var(--glow), var(--glow)) top 16px right 16px / 24px 2px no-repeat,
        linear-gradient(var(--glow), var(--glow)) top 16px right 16px / 2px 24px no-repeat,
        linear-gradient(var(--glow), var(--glow)) bottom 16px left 16px / 24px 2px no-repeat,
        linear-gradient(var(--glow), var(--glow)) bottom 16px left 16px / 2px 24px no-repeat,
        linear-gradient(var(--glow), var(--glow)) bottom 16px right 16px / 24px 2px no-repeat,
        linear-gradient(var(--glow), var(--glow)) bottom 16px right 16px / 2px 24px no-repeat;
      opacity: .5;
    }

    .camera-label {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--glow);
      letter-spacing: 3px;
      opacity: .6;
      text-transform: uppercase;
    }

    .no-feed {
      font-family: var(--mono);
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 2px;
      text-align: center;
      line-height: 2;
    }

    .no-feed-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 12px;
    }

    /* ── D-Pad Overlay ────────────────────────────────────────────── */
    #dpad-overlay {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 10;
      user-select: none;
    }

    #dpad-overlay.visible { display: flex; }

    .dpad-row {
      display: flex;
      gap: 4px;
    }

    .dpad-btn {
      width: 52px;
      height: 52px;
      background: rgba(0, 0, 0, .72);
      border: 1px solid var(--glow-mid);
      border-radius: 8px;
      color: var(--glow);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .1s, box-shadow .1s;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad-btn:active,
    .dpad-btn.pressed {
      background: rgba(0, 255, 213, .22);
      box-shadow: 0 0 14px var(--glow);
    }

    .dpad-center {
      background: rgba(239, 68, 68, .18);
      border-color: rgba(239, 68, 68, .5);
      color: var(--red);
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* control status banner on camera */
    #control-banner {
      position: absolute;
      top: 20px;
      right: 20px;
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 5px;
      background: rgba(0, 0, 0, .7);
      border: 1px solid var(--glow-mid);
      color: var(--glow);
      letter-spacing: 1px;
      display: none;
    }

    #control-banner.visible { display: block; }

    /* ── Right Sidebar ────────────────────────────────────────────── */
    .sidebar {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Personality Card ─────────────────────────────────────────── */
    .personality-card {
      padding: 14px 18px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .personality-card .label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .personality-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-bright);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .personality-name .emoji { font-size: 22px; }

    .personality-name .name-text {
      text-shadow: 0 0 20px var(--p-color, var(--glow));
      color: var(--p-color, var(--glow));
    }

    .personality-bias {
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ── Persona Switcher ─────────────────────────────────────────── */
    .persona-switcher {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .persona-btn {
      flex: 1;
      padding: 5px 4px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 10px;
      cursor: pointer;
      text-align: center;
      transition: all .2s;
      letter-spacing: .5px;
    }

    .persona-btn:hover {
      border-color: var(--p-btn-color, var(--glow));
      color: var(--p-btn-color, var(--glow));
      background: rgba(255,255,255,.04);
    }

    .persona-btn.active {
      border-color: var(--p-btn-color, var(--glow));
      color: var(--p-btn-color, var(--glow));
      background: rgba(255,255,255,.07);
      box-shadow: 0 0 8px color-mix(in srgb, var(--p-btn-color, var(--glow)) 30%, transparent);
    }

    /* ── Thought Bubble ───────────────────────────────────────────── */
    .thought-section {
      padding: 12px 18px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }

    .thought-section .label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .thought-bubble {
      position: relative;
      background: var(--bg2);
      border: 1px solid var(--glow-mid);
      border-radius: 8px;
      padding: 12px 14px;
      min-height: 64px;
      box-shadow: 0 0 20px var(--glow-dim);
    }

    #thought-text {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      color: var(--text-bright);
      white-space: pre-wrap;
    }

    .thought-cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--glow);
      opacity: 1;
      animation: blink .8s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1 }
      50% { opacity: 0 }
    }

    /* ── Action / Distance Row ────────────────────────────────────── */
    .status-row {
      display: flex;
      gap: 10px;
      padding: 12px 18px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .action-badge {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 1px solid transparent;
      transition: background .3s, color .3s, border-color .3s, box-shadow .3s;
      white-space: nowrap;
    }

    .action-forward  { background: rgba(34,197,94,.15); color: var(--green); border-color: var(--green); box-shadow: 0 0 12px rgba(34,197,94,.3); }
    .action-backward { background: rgba(249,115,22,.15); color: var(--orange); border-color: var(--orange); box-shadow: 0 0 12px rgba(249,115,22,.3); }
    .action-left,
    .action-right    { background: rgba(245,158,11,.15); color: var(--yellow); border-color: var(--yellow); box-shadow: 0 0 12px rgba(245,158,11,.3); }
    .action-stop     { background: rgba(239,68,68,.15); color: var(--red); border-color: var(--red); box-shadow: 0 0 12px rgba(239,68,68,.3); }

    @keyframes safety-flash {
      0%, 100% { background: rgba(239,68,68,.15); }
      50%       { background: rgba(239,68,68,.5); }
    }
    .safety-active { animation: safety-flash .4s ease 3; }

    .dist-widget {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .dist-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
    }

    .dist-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,.06);
      border-radius: 3px;
      overflow: hidden;
    }

    #dist-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--glow);
      box-shadow: 0 0 6px var(--glow);
      transition: width .4s ease, background .3s;
      width: 100%;
    }

    /* ── Control / Queue Panel ────────────────────────────────────── */
    .control-section {
      padding: 12px 18px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .control-section .label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    /* Join form */
    #join-form {
      display: flex;
      gap: 6px;
    }

    #join-name {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-bright);
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
      transition: border-color .2s;
    }

    #join-name:focus { border-color: var(--glow-mid); }

    #join-btn, #leave-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 5px;
      border: 1px solid var(--glow-mid);
      background: var(--glow-dim);
      color: var(--glow);
      cursor: pointer;
      transition: all .2s;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    #join-btn:hover { background: rgba(0,255,213,.2); }

    #leave-btn {
      border-color: rgba(239,68,68,.4);
      background: rgba(239,68,68,.1);
      color: var(--red);
      display: none;
    }

    #leave-btn:hover { background: rgba(239,68,68,.2); }

    /* Queue status */
    #queue-status {
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      min-height: 20px;
    }

    #queue-status .qs-controller {
      color: var(--green);
      font-weight: 600;
    }

    #queue-status .qs-you {
      color: var(--glow);
    }

    #queue-status .qs-waiting {
      color: var(--yellow);
    }

    /* Timer bar */
    #timer-bar-wrap {
      margin-top: 6px;
      display: none;
    }

    #timer-bar-wrap.visible { display: block; }

    .timer-bar-bg {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,.06);
      border-radius: 2px;
      overflow: hidden;
    }

    #timer-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--green);
      transition: width .5s linear, background .3s;
    }

    /* ── Log / Chat Tabs ──────────────────────────────────────────── */
    .log-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      min-height: 0;
    }

    .tab-bar {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      padding: 9px 0;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: color .2s, border-color .2s;
      position: relative;
    }

    .tab-btn.active {
      color: var(--glow);
      border-bottom-color: var(--glow);
    }

    .tab-btn .unread-dot {
      position: absolute;
      top: 6px;
      right: 24px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      display: none;
    }

    .tab-btn .unread-dot.visible { display: block; }

    .tab-pane {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .tab-pane.active { display: flex; }

    /* ── Event Log ────────────────────────────────────────────────── */
    #event-log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #event-log::-webkit-scrollbar { width: 4px; }
    #event-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-entry {
      padding: 8px 18px;
      border-bottom: 1px solid rgba(255,255,255,.03);
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px) }
      to   { opacity: 1; transform: translateY(0) }
    }

    .log-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      gap: 8px;
      margin-bottom: 3px;
    }

    .log-action-tag {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .log-entry.forward  .log-action-tag { color: var(--green); }
    .log-entry.backward .log-action-tag { color: var(--orange); }
    .log-entry.left     .log-action-tag,
    .log-entry.right    .log-action-tag { color: var(--yellow); }
    .log-entry.stop     .log-action-tag { color: var(--red); }

    .log-thought {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      font-style: italic;
    }

    .safety-tag {
      display: inline-block;
      background: rgba(239,68,68,.2);
      color: var(--red);
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid var(--red);
      font-family: var(--mono);
      margin-left: 4px;
      letter-spacing: 1px;
    }

    .remote-tag {
      display: inline-block;
      background: rgba(0,255,213,.1);
      color: var(--glow);
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid var(--glow-mid);
      font-family: var(--mono);
      margin-left: 4px;
      letter-spacing: 1px;
    }

    /* ── Chat Panel ───────────────────────────────────────────────── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chat-bubble-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
      animation: fadeIn .3s ease;
    }

    .chat-bubble-wrap.from-user { align-items: flex-end; }
    .chat-bubble-wrap.from-bot  { align-items: flex-start; }

    .chat-meta {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      padding: 0 6px;
    }

    .chat-bubble {
      max-width: 88%;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.55;
    }

    .from-user .chat-bubble {
      background: rgba(0, 255, 213, .1);
      border: 1px solid var(--glow-mid);
      color: var(--text-bright);
      border-bottom-right-radius: 3px;
    }

    .from-bot .chat-bubble {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
      font-style: italic;
    }

    .bot-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--p-color, var(--glow));
      padding: 0 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .chat-input-row {
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-bright);
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
      transition: border-color .2s;
    }

    #chat-input:focus { border-color: var(--glow-mid); }

    #chat-send {
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 5px;
      border: 1px solid var(--glow-mid);
      background: var(--glow-dim);
      color: var(--glow);
      cursor: pointer;
      transition: all .2s;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    #chat-send:hover:not(:disabled) { background: rgba(0,255,213,.2); }
    #chat-send:disabled { opacity: .4; cursor: default; }

    .chat-thinking {
      display: flex;
      gap: 4px;
      padding: 6px 12px;
      align-items: center;
    }

    .chat-thinking span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: thinking-pulse 1.2s ease-in-out infinite;
    }

    .chat-thinking span:nth-child(2) { animation-delay: .2s; }
    .chat-thinking span:nth-child(3) { animation-delay: .4s; }

    @keyframes thinking-pulse {
      0%, 80%, 100% { opacity: .3; transform: scale(.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Status Bar ───────────────────────────────────────────────── */
    footer {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 7px 20px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    footer .seg {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    footer .seg span { color: var(--text); }
    footer .sep { flex: 1; }

    #hard-stop-count { color: var(--red); }

    /* ── Mute button ──────────────────────────────────────────────── */
    #mute-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid var(--glow-mid);
      background: var(--glow-dim);
      color: var(--glow);
      cursor: pointer;
      transition: all .2s;
      user-select: none;
      letter-spacing: 1px;
    }

    #mute-btn:hover { background: rgba(0,255,213,.2); }

    #mute-btn.muted {
      border-color: var(--text-dim);
      background: transparent;
      color: var(--text-dim);
    }
  </style>
</head>

<body>

  <div class="layout">

    <!-- ── Header ─────────────────────────────────────────────────── -->
    <header>
      <div class="logo">[ WHEELSON <span>//</span> EXPLORER ]</div>
      <div class="header-meta">
        <div class="badge" id="cycle-badge">CYCLE 0</div>
        <div class="badge" id="status-badge">CONNECTING…</div>
        <button id="mute-btn" title="Toggle Wheelson voice">🔊 VOICE</button>
        <div class="conn-dot" id="conn-dot" title="Stream connection"></div>
      </div>
    </header>

    <!-- ── Camera ─────────────────────────────────────────────────── -->
    <div class="camera-panel">
      <img id="camera-feed" src="" alt="" style="display:none">
      <div class="no-feed" id="no-feed">
        <span class="no-feed-icon">📡</span>
        AWAITING FIRST FRAME…<br>
        <span style="font-size:10px;opacity:.5">stream will begin shortly</span>
      </div>
      <div class="camera-overlay"></div>
      <div class="camera-label">LIVE · ONBOARD CAM</div>

      <!-- Remote control banner -->
      <div id="control-banner"></div>

      <!-- D-Pad (shown when you're in control) -->
      <div id="dpad-overlay">
        <div class="dpad-row">
          <button class="dpad-btn" data-dir="forward" title="Forward [W/↑]">▲</button>
        </div>
        <div class="dpad-row">
          <button class="dpad-btn" data-dir="left"    title="Left [A/←]">◀</button>
          <button class="dpad-btn dpad-center" data-dir="stop" title="Stop [Space]">■</button>
          <button class="dpad-btn" data-dir="right"   title="Right [D/→]">▶</button>
        </div>
        <div class="dpad-row">
          <button class="dpad-btn" data-dir="backward" title="Backward [S/↓]">▼</button>
        </div>
      </div>
    </div>

    <!-- ── Sidebar ─────────────────────────────────────────────────── -->
    <aside class="sidebar">

      <!-- Personality card + switcher -->
      <div class="personality-card">
        <div class="label">ACTIVE PERSONALITY</div>
        <div class="personality-name">
          <span class="emoji" id="p-emoji">🤖</span>
          <span class="name-text" id="p-name">—</span>
        </div>
        <div class="personality-bias" id="p-bias">–</div>
        <div class="persona-switcher" id="persona-switcher">
          <!-- buttons injected by JS -->
        </div>
      </div>

      <!-- Thought bubble -->
      <div class="thought-section">
        <div class="label">INTERNAL MONOLOGUE</div>
        <div class="thought-bubble">
          <span id="thought-text">Awaiting first cycle…</span><span class="thought-cursor"></span>
        </div>
      </div>

      <!-- Action + Distance row -->
      <div class="status-row">
        <div class="action-badge action-stop" id="action-badge">STOP</div>
        <div class="dist-widget">
          <div class="dist-label">
            <span>DISTANCE</span>
            <span id="dist-value">— cm</span>
          </div>
          <div class="dist-bar-bg">
            <div id="dist-bar-fill"></div>
          </div>
        </div>
      </div>

      <!-- Remote Control / Queue panel -->
      <div class="control-section">
        <div class="label">REMOTE CONTROL</div>
        <div id="join-form">
          <input id="join-name" type="text" maxlength="32" placeholder="your name…" autocomplete="off">
          <button id="join-btn">JOIN</button>
          <button id="leave-btn">LEAVE</button>
        </div>
        <div id="queue-status"></div>
        <div id="timer-bar-wrap">
          <div class="timer-bar-bg"><div id="timer-bar-fill"></div></div>
        </div>
      </div>

      <!-- Log / Chat tabs -->
      <div class="log-section">
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="log">
            EVENT LOG
          </button>
          <button class="tab-btn" data-tab="chat">
            CHAT
            <span class="unread-dot" id="chat-unread"></span>
          </button>
        </div>

        <div class="tab-pane active" id="tab-log">
          <div id="event-log"></div>
        </div>

        <div class="tab-pane" id="tab-chat">
          <div id="chat-messages"></div>
          <div class="chat-input-row">
            <input id="chat-input" type="text" maxlength="300"
              placeholder="ask wheelson something…" autocomplete="off">
            <button id="chat-send">SEND</button>
          </div>
        </div>
      </div>

    </aside>

    <!-- ── Footer ─────────────────────────────────────────────────── -->
    <footer>
      <div class="seg">HARD STOPS <span id="hard-stop-count">0</span></div>
      <div class="seg">LAST MOVE <span id="footer-duration">—</span></div>
      <div class="sep"></div>
      <div class="seg">WHEELSON EXPLORER · 2025</div>
    </footer>

  </div>

  <script>
    // ── Personality metadata ───────────────────────────────────────────
    const PERSONALITIES = {
      benson:    { name: "BENSON",    emoji: "🦺", color: "#f59e0b", bias: "Methodical · centre-of-path · zero-risk tolerance", voiceHints: ["Alex","Daniel","Fred","Ralph"] },
      sir_david: { name: "Sir David", emoji: "🎙️", color: "#10b981", bias: "Curiosity-driven · moves toward interesting objects",  voiceHints: ["Daniel","Arthur","Oliver","Rishi"] },
      klaus:     { name: "Klaus",     emoji: "🎨", color: "#8b5cf6", bias: "Perimeter-hugging · wide arcing turns",                voiceHints: ["Martha","Victoria","Serena","Moira"] },
      zog7:      { name: "Zog-7",     emoji: "👾", color: "#06b6d4", bias: "Stealthy · shadow-seeking · wall-hugging",             voiceHints: ["Zarvox","Trinoids","Albert","Cellos"] },
    };

    // ── Persona switcher buttons ───────────────────────────────────────
    const $switcher = document.getElementById('persona-switcher');
    Object.entries(PERSONALITIES).forEach(([key, p]) => {
      const btn = document.createElement('button');
      btn.className = 'persona-btn';
      btn.dataset.key = key;
      btn.style.setProperty('--p-btn-color', p.color);
      btn.textContent = p.emoji;
      btn.title = p.name;
      btn.addEventListener('click', () => switchPersona(key));
      $switcher.appendChild(btn);
    });

    function switchPersona(key) {
      fetch('/persona', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ persona: key }),
      }).catch(console.error);
    }

    function updatePersonaSwitcher(activeKey) {
      $switcher.querySelectorAll('.persona-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.key === activeKey);
      });
    }

    // ── Voice engine ───────────────────────────────────────────────────
    const synth = window.speechSynthesis;
    let isMuted = false;
    let activeVoice = null;
    let currentPersonalityKey = 'benson';
    let hasUserGesture = false;
    let pendingThought = null;

    function pickVoice(key) {
      const hints = (PERSONALITIES[key] || {}).voiceHints || [];
      const voices = synth.getVoices();
      for (const hint of hints) {
        const v = voices.find(v => v.name.toLowerCase().includes(hint.toLowerCase()));
        if (v) return v;
      }
      return voices.find(v => v.lang.startsWith('en')) || voices[0] || null;
    }

    function doSpeak(text) {
      synth.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.voice = activeVoice;
      utter.rate = 1.05;
      utter.pitch = currentPersonalityKey === 'zog7' ? 0.7 : 1.0;
      synth.speak(utter);
    }

    function speak(text) {
      if (isMuted || !text || !synth) return;
      if (!hasUserGesture) { pendingThought = text; return; }
      doSpeak(text);
    }

    function onFirstGesture() {
      if (hasUserGesture) return;
      hasUserGesture = true;
      if (pendingThought && !isMuted) { doSpeak(pendingThought); pendingThought = null; }
    }
    document.addEventListener('click', onFirstGesture);
    document.addEventListener('keydown', onFirstGesture);

    synth.onvoiceschanged = () => { activeVoice = pickVoice(currentPersonalityKey); };
    activeVoice = pickVoice(currentPersonalityKey);

    const $muteBtn = document.getElementById('mute-btn');
    $muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      if (isMuted) { synth.cancel(); $muteBtn.textContent = '🔇 MUTED'; $muteBtn.classList.add('muted'); }
      else          { $muteBtn.textContent = '🔊 VOICE'; $muteBtn.classList.remove('muted'); }
    });

    // ── DOM refs ──────────────────────────────────────────────────────
    const $feed      = document.getElementById('camera-feed');
    const $noFeed    = document.getElementById('no-feed');
    const $thought   = document.getElementById('thought-text');
    const $action    = document.getElementById('action-badge');
    const $distVal   = document.getElementById('dist-value');
    const $distBar   = document.getElementById('dist-bar-fill');
    const $log       = document.getElementById('event-log');
    const $cycle     = document.getElementById('cycle-badge');
    const $status    = document.getElementById('status-badge');
    const $dot       = document.getElementById('conn-dot');
    const $pEmoji    = document.getElementById('p-emoji');
    const $pName     = document.getElementById('p-name');
    const $pBias     = document.getElementById('p-bias');
    const $stops     = document.getElementById('hard-stop-count');
    const $duration  = document.getElementById('footer-duration');

    // Control / queue refs
    const $joinName     = document.getElementById('join-name');
    const $joinBtn      = document.getElementById('join-btn');
    const $leaveBtn     = document.getElementById('leave-btn');
    const $queueStatus  = document.getElementById('queue-status');
    const $timerWrap    = document.getElementById('timer-bar-wrap');
    const $timerFill    = document.getElementById('timer-bar-fill');
    const $dpad         = document.getElementById('dpad-overlay');
    const $banner       = document.getElementById('control-banner');

    let hardStopCount = 0;
    let lastThought = '';
    let typewriterTimer = null;

    // ── Typewriter ────────────────────────────────────────────────────
    function typewrite(text) {
      if (text === lastThought) return;
      lastThought = text;
      clearTimeout(typewriterTimer);
      $thought.textContent = '';
      speak(text);
      let i = 0;
      const step = () => {
        if (i < text.length) {
          $thought.textContent += text[i++];
          typewriterTimer = setTimeout(step, 6);
        }
      };
      step();
    }

    // ── Distance bar ──────────────────────────────────────────────────
    function updateDistance(cm) {
      const frac = Math.min(cm, 200) / 200;
      const danger = cm < 10, warn = cm < 30;
      $distVal.textContent = cm >= 900 ? '∞  cm' : `${cm.toFixed(1)} cm`;
      $distVal.style.color = danger ? '#ef4444' : warn ? '#f59e0b' : '#00ffd5';
      $distBar.style.width = `${Math.round(frac * 100)}%`;
      $distBar.style.background = danger ? '#ef4444' : warn ? '#f59e0b' : '#00ffd5';
      $distBar.style.boxShadow = `0 0 6px ${danger ? '#ef4444' : warn ? '#f59e0b' : '#00ffd5'}`;
    }

    // ── Action badge ──────────────────────────────────────────────────
    function updateAction(action, safety) {
      $action.className = `action-badge action-${action}`;
      $action.textContent = action.toUpperCase();
      if (safety) {
        $action.classList.add('safety-active');
        hardStopCount++;
        $stops.textContent = hardStopCount;
      }
    }

    // ── Personality panel ─────────────────────────────────────────────
    function updatePersonality(key) {
      const p = PERSONALITIES[key] || {};
      $pEmoji.textContent = p.emoji || '🤖';
      $pName.textContent = p.name || key;
      $pName.style.color = p.color || '#00ffd5';
      $pName.style.textShadow = `0 0 20px ${p.color || '#00ffd5'}`;
      $pBias.textContent = p.bias || '';
      document.documentElement.style.setProperty('--p-color', p.color || '#00ffd5');
      if (key !== currentPersonalityKey) {
        currentPersonalityKey = key;
        activeVoice = pickVoice(key);
      }
      updatePersonaSwitcher(key);
    }

    // ── Event log ─────────────────────────────────────────────────────
    function appendLog(data) {
      const isRemote = data.command_source === 'remote';
      const el = document.createElement('div');
      el.className = `log-entry ${data.action}`;
      el.innerHTML = `
        <div class="log-meta">
          <span>${data.ts || ''}</span>
          <span class="log-action-tag">${data.action.toUpperCase()}${data.duration_ms ? ` · ${data.duration_ms}ms` : ''}</span>
          <span>${data.distance_cm < 900 ? data.distance_cm.toFixed(1) + ' cm' : '∞'}</span>
          ${data.safety ? '<span class="safety-tag">⚠ HARD STOP</span>' : ''}
          ${isRemote ? `<span class="remote-tag">🎮 ${data.remote_controller || 'human'}</span>` : ''}
        </div>
        <div class="log-thought">"${data.thought || ''}"</div>`;
      $log.prepend(el);
      while ($log.children.length > 20) $log.removeChild($log.lastChild);
    }

    // ── Remote control session ────────────────────────────────────────
    let myToken = null;
    let myName  = null;
    let myQueuePos = null;
    let controlBudget = 60;
    let lastRemoteData = {};

    // Join the queue
    $joinBtn.addEventListener('click', async () => {
      const name = $joinName.value.trim();
      if (!name) { $joinName.focus(); return; }
      try {
        const res = await fetch('/queue/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        const data = await res.json();
        if (res.ok) {
          myToken = data.token;
          myName  = name;
          myQueuePos = data.position;
          controlBudget = data.budget_sec || 60;
          $joinName.disabled = true;
          $joinBtn.style.display = 'none';
          $leaveBtn.style.display = '';
          updateQueueUI(lastRemoteData);
        } else {
          alert(data.error || 'Could not join queue');
        }
      } catch (e) {
        console.error(e);
      }
    });

    // Leave the queue
    $leaveBtn.addEventListener('click', async () => {
      if (!myToken) return;
      await fetch('/queue/leave', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: myToken }),
      }).catch(console.error);
      clearSession();
      updateQueueUI(lastRemoteData);
    });

    function clearSession() {
      myToken = null;
      myName  = null;
      myQueuePos = null;
      $joinName.disabled = false;
      $joinBtn.style.display = '';
      $leaveBtn.style.display = 'none';
      $dpad.classList.remove('visible');
      $banner.classList.remove('visible');
      $timerWrap.classList.remove('visible');
    }

    // Update queue status display from SSE data
    function updateQueueUI(data) {
      lastRemoteData = data;
      const controller = data.remote_controller || '';
      const qLen      = data.remote_queue_length || 0;
      const remaining = data.remote_remaining_s || 0;
      const isActive  = data.remote_is_active;

      const imController = myToken && controller === myName && isActive;
      const imInQueue     = myToken && qLen > 0;

      // D-pad and control banner
      if (imController) {
        $dpad.classList.add('visible');
        $banner.textContent = `🎮 YOU ARE IN CONTROL · ${Math.ceil(remaining)}s`;
        $banner.classList.add('visible');
        $timerWrap.classList.add('visible');
        const pct = Math.max(0, (remaining / controlBudget) * 100);
        $timerFill.style.width = pct + '%';
        $timerFill.style.background = pct < 25 ? '#ef4444' : pct < 50 ? '#f59e0b' : '#22c55e';
      } else {
        $dpad.classList.remove('visible');
        $banner.classList.remove('visible');
        // Show timer for head of queue (not yet active)
        if (myToken && controller === myName && !isActive) {
          $timerWrap.classList.add('visible');
          const pct = Math.max(0, (remaining / controlBudget) * 100);
          $timerFill.style.width = pct + '%';
          $timerFill.style.background = '#f59e0b';
        } else {
          $timerWrap.classList.remove('visible');
        }
      }

      // Text status
      let lines = [];
      if (controller && isActive) {
        lines.push(`<span class="${controller === myName ? 'qs-you' : 'qs-controller'}">🎮 ${controller} in control · ${Math.ceil(remaining)}s</span>`);
      } else if (controller && !isActive) {
        lines.push(`<span class="qs-waiting">⏳ ${controller} up next — start pressing keys</span>`);
      }
      if (qLen > 1) {
        lines.push(`<span>${qLen - 1} waiting in queue</span>`);
      }
      if (!myToken) {
        if (qLen === 0) lines.push('No one in queue · enter your name to take control');
        else lines.push('Enter your name to join the queue');
      } else if (!imController && controller !== myName) {
        lines.push(`<span class="qs-you">You are in queue — ${qLen} ahead</span>`);
      }
      $queueStatus.innerHTML = lines.join('<br>');

      // Session expiry detection (server will have removed us)
      if (myToken && controller && qLen > 0) {
        // We're still in system, check if our remaining is 0 and we were controller
        if (imController && remaining <= 0) {
          clearSession();
        }
      }
    }

    // ── D-Pad & keyboard control ──────────────────────────────────────
    const heldKeys = new Set();
    let cmdInterval = null;
    let activeDir = null;

    const KEY_DIR_MAP = {
      ArrowUp: 'forward', w: 'forward', W: 'forward',
      ArrowDown: 'backward', s: 'backward', S: 'backward',
      ArrowLeft: 'left', a: 'left', A: 'left',
      ArrowRight: 'right', d: 'right', D: 'right',
      ' ': 'stop',
    };

    function isMyTurn() {
      return myToken && lastRemoteData.remote_controller === myName;
    }

    function startSending(dir) {
      if (activeDir === dir) return;
      stopSending();
      activeDir = dir;
      sendCommand(dir);
      if (dir !== 'stop') {
        cmdInterval = setInterval(() => sendCommand(dir), 350);
      }
      highlightDpadBtn(dir, true);
    }

    function stopSending() {
      if (cmdInterval) { clearInterval(cmdInterval); cmdInterval = null; }
      if (activeDir && activeDir !== 'stop') {
        sendCommand('stop');
      }
      highlightDpadBtn(activeDir, false);
      activeDir = null;
    }

    async function sendCommand(dir) {
      if (!myToken) return;
      try {
        await fetch('/control', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: myToken, direction: dir }),
        });
      } catch (e) { /* ignore transient errors */ }
    }

    function highlightDpadBtn(dir, on) {
      $dpad.querySelectorAll('.dpad-btn').forEach(btn => {
        if (btn.dataset.dir === dir) btn.classList.toggle('pressed', on);
      });
    }

    // Keyboard events
    document.addEventListener('keydown', e => {
      if (!isMyTurn()) return;
      if (e.target === $joinName) return;
      const dir = KEY_DIR_MAP[e.key];
      if (!dir) return;
      e.preventDefault();
      if (heldKeys.has(e.key)) return;
      heldKeys.add(e.key);
      startSending(dir);
    });

    document.addEventListener('keyup', e => {
      const dir = KEY_DIR_MAP[e.key];
      if (!dir) return;
      heldKeys.delete(e.key);
      if (activeDir === dir && heldKeys.size === 0) stopSending();
    });

    // D-Pad button events (pointer for touch + mouse)
    $dpad.querySelectorAll('.dpad-btn').forEach(btn => {
      const dir = btn.dataset.dir;

      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        btn.setPointerCapture(e.pointerId);
        startSending(dir);
      });

      btn.addEventListener('pointerup', e => {
        e.preventDefault();
        if (activeDir === dir) stopSending();
      });

      btn.addEventListener('pointercancel', () => {
        if (activeDir === dir) stopSending();
      });
    });

    // ── Tab switching ─────────────────────────────────────────────────
    const $tabBtns  = document.querySelectorAll('.tab-btn');
    const $tabPanes = document.querySelectorAll('.tab-pane');
    const $chatUnread = document.getElementById('chat-unread');
    let activeTab = 'log';

    $tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        activeTab = tab;
        $tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
        $tabPanes.forEach(p => p.classList.toggle('active', p.id === `tab-${tab}`));
        if (tab === 'chat') {
          $chatUnread.classList.remove('visible');
          // Scroll chat to bottom when switching to it
          const $cm = document.getElementById('chat-messages');
          $cm.scrollTop = $cm.scrollHeight;
        }
      });
    });

    // ── Chat ──────────────────────────────────────────────────────────
    const $chatInput  = document.getElementById('chat-input');
    const $chatSend   = document.getElementById('chat-send');
    const $chatMsgs   = document.getElementById('chat-messages');

    // Remember chat name across sessions; default to control queue name if set
    function getChatName() {
      return myName || localStorage.getItem('wheelson_chat_name') || 'visitor';
    }

    function appendChatBubble({ from, message, response, p_emoji, p_name, ts, personality }) {
      const p = PERSONALITIES[personality] || {};
      const color = p.color || '#00ffd5';

      // User bubble
      const userWrap = document.createElement('div');
      userWrap.className = 'chat-bubble-wrap from-user';
      userWrap.innerHTML = `
        <div class="chat-meta">${from} · ${ts}</div>
        <div class="chat-bubble">${escHtml(message)}</div>`;
      $chatMsgs.appendChild(userWrap);

      // Bot bubble
      const botWrap = document.createElement('div');
      botWrap.className = 'chat-bubble-wrap from-bot';
      botWrap.innerHTML = `
        <div class="bot-label" style="color:${color}">${p_emoji || p.emoji || '🤖'} ${p_name || p.name || 'Wheelson'}</div>
        <div class="chat-bubble">${escHtml(response)}</div>`;
      $chatMsgs.appendChild(botWrap);

      $chatMsgs.scrollTop = $chatMsgs.scrollHeight;

      // Unread dot when chat tab isn't active
      if (activeTab !== 'chat') {
        $chatUnread.classList.add('visible');
      }

      // Speak the response
      speak(response);
    }

    function appendThinkingIndicator() {
      const el = document.createElement('div');
      el.className = 'chat-bubble-wrap from-bot';
      el.id = 'chat-thinking-wrap';
      el.innerHTML = `<div class="chat-thinking"><span></span><span></span><span></span></div>`;
      $chatMsgs.appendChild(el);
      $chatMsgs.scrollTop = $chatMsgs.scrollHeight;
    }

    function removeThinkingIndicator() {
      document.getElementById('chat-thinking-wrap')?.remove();
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function sendChat() {
      const message = $chatInput.value.trim();
      if (!message) return;
      const name = getChatName();
      $chatInput.value = '';
      $chatSend.disabled = true;

      // Optimistic: show user message + thinking dots immediately
      appendThinkingIndicator();
      $chatMsgs.scrollTop = $chatMsgs.scrollHeight;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, name }),
        });
        // The broadcast via SSE will deliver the full bubble — just remove thinking dots
        removeThinkingIndicator();
        if (!res.ok) {
          const userWrap = document.createElement('div');
          userWrap.className = 'chat-bubble-wrap from-user';
          userWrap.innerHTML = `<div class="chat-bubble">${escHtml(message)}</div>`;
          $chatMsgs.prepend(userWrap);
        }
      } catch {
        removeThinkingIndicator();
      } finally {
        $chatSend.disabled = false;
        $chatInput.focus();
      }
    }

    $chatSend.addEventListener('click', sendChat);
    $chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    });

    // ── Process SSE event ─────────────────────────────────────────────
    function handleEvent(data) {
      // Chat messages are broadcast as separate events
      if (data.type === 'chat') {
        removeThinkingIndicator();
        appendChatBubble(data);
        return;
      }

      if (data.frame_b64) {
        $feed.src = 'data:image/jpeg;base64,' + data.frame_b64;
        $feed.style.display = 'block';
        $noFeed.style.display = 'none';
      }
      if (data.personality) updatePersonality(data.personality);
      if (data.thought != null) typewrite(data.thought || '…');
      updateAction(data.action || 'stop', !!data.safety);
      updateDistance(parseFloat(data.distance_cm) || 999);
      $cycle.textContent = `CYCLE ${data.cycle || 0}`;
      if (data.duration_ms) $duration.textContent = `${data.duration_ms}ms`;
      appendLog(data);
      updateQueueUI(data);
    }

    // ── SSE connection ────────────────────────────────────────────────
    function connect() {
      $status.textContent = 'CONNECTING…';
      $dot.classList.remove('live');

      const es = new EventSource('/stream');

      es.onopen = () => {
        $status.textContent = 'LIVE';
        $dot.classList.add('live');
      };

      es.onmessage = (e) => {
        try { handleEvent(JSON.parse(e.data)); }
        catch (err) { console.error('Parse error:', err); }
      };

      es.onerror = () => {
        $status.textContent = 'RECONNECTING…';
        $dot.classList.remove('live');
        es.close();
        setTimeout(connect, 3000);
      };
    }

    connect();
  </script>
</body>

</html>
